<!doctype html>
<html lang="fr">

    <!-- ══ Schema.org JSON-LD — RealEstateAgent + LocalBusiness ══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["RealEstateAgent", "LocalBusiness"],
      "name": "Vania",
      "description": "Agence de marketing immobilier haut de gamme spécialisée dans la gestion locative de résidences meublées et non meublées au Cameroun.",
      "url": "https://vania-residence.com",
      "telephone": "+237690536012",
      "email": "contact@vania-residence.com",
      "logo": "https://vania-residence.com/src/assets/icone.png",
      "image": "https://vania-residence.com/og-image.jpg",
      "priceRange": "€€€",
      "currenciesAccepted": "XAF",
      "paymentAccepted": "Mobile Money, Virement bancaire",
      "areaServed": [
        { "@type": "City", "name": "Douala", "sameAs": "https://fr.wikipedia.org/wiki/Douala" },
        { "@type": "City", "name": "Yaoundé", "sameAs": "https://fr.wikipedia.org/wiki/Yaound%C3%A9" },
        { "@type": "Country", "name": "Cameroun", "sameAs": "https://fr.wikipedia.org/wiki/Cameroun" }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Douala",
        "addressCountry": "CM"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+237690536012",
        "contactType": "customer service",
        "availableLanguage": ["French"],
        "contactOption": "TollFree"
      },
      "sameAs": [
        "https://www.instagram.com/vania.imo",
        "https://www.tiktok.com/@vania.imo"
      ],
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "08:00",
        "closes": "19:00"
      }
    }
    </script>

    <!-- ══ Schema.org JSON-LD — FAQ Page ═══════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Comment confier mon appartement meublé à Vania au Cameroun ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Il vous suffit de demander une consultation privée de 20 minutes via notre formulaire. Notre équipe prend contact pour évaluer votre résidence et vous proposer un plan de valorisation adapté."
          }
        },
        {
          "@type": "Question",
          "name": "Vania propose-t-elle la gestion locative de maisons non meublées ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Vania accompagne aussi bien les propriétaires de logements non meublés que meublés. Nous établissons un plan de mise en valeur, de contenu et de distribution adapté à chaque type de bien."
          }
        },
        {
          "@type": "Question",
          "name": "Dans quelles villes Vania opère-t-elle au Cameroun ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vania est active principalement à Douala et Yaoundé, mais accompagne aussi des propriétaires dans d'autres villes du Cameroun. Contactez-nous pour vérifier la disponibilité dans votre zone."
          }
        },
        {
          "@type": "Question",
          "name": "Combien coûte la gestion locative avec Vania ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le coût dépend de votre bien et de vos objectifs. Vania propose un premier entretien gratuit et confidentiel pour vous présenter une offre tailor-made sans engagement."
          }
        }
      ]
    }
    </script>

    <!-- ══ Schema.org JSON-LD — Review + AggregateRating ═════════ -->

      "@context": "https://schema.org",

      "name": "Vania",
      "aggregateRating": {
        "@type": "AggregateRating",

        }
      ]
    }
    </script>
